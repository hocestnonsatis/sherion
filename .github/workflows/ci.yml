name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb1-dev
      - run: cargo build --release
      - run: cargo test
      - run: cargo test --features simd-utf8
