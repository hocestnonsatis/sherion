# Linux package formats (.deb, .rpm, Flatpak, AppImage) uploaded to GitHub Releases.
# Runs after the cargo-dist Release workflow publishes a release.

name: Release Packages

on:
  release:
    types: [published]
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to package (e.g. v0.1.2)
        required: true
        type: string
      skip_deb:
        description: Skip rebuilding the .deb package
        required: false
        type: boolean
        default: false
      skip_appimage:
        description: Skip rebuilding the AppImage
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.event.workflow_run.head_branch }}

jobs:
  package-deb:
    name: Debian (.deb)
    if: ${{ (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') && !(github.event_name == 'workflow_dispatch' && inputs.skip_deb) }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb1-dev
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked --version 3.6.4
      - name: Build .deb
        run: cargo deb
      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${TAG}" target/debian/*.deb --clobber

  package-rpm:
    name: RPM (.rpm)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    container: fedora:41
    steps:
      - name: Install git
        run: dnf install -y git
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
          submodules: recursive
      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc \
            git \
            fontconfig-devel \
            libxkbcommon-devel \
            wayland-devel \
            libxcb-devel \
            perl-FindBin \
            perl-IPC-Cmd
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Install cargo-generate-rpm
        run: |
          source "$HOME/.cargo/env"
          cargo install cargo-generate-rpm --locked --version 0.21.0
      - name: Build .rpm
        run: |
          source "$HOME/.cargo/env"
          cargo build --release
          cargo generate-rpm
      - name: Install GitHub CLI
        run: |
          curl -fsSL https://github.com/cli/cli/releases/download/v2.67.0/gh_2.67.0_linux_amd64.tar.gz -o /tmp/gh.tgz
          tar -xzf /tmp/gh.tgz -C /tmp
          echo "GH=/tmp/gh_2.67.0_linux_amd64/bin/gh" >> "$GITHUB_ENV"
      - name: Upload .rpm to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory '*'
          "${GH}" release upload "${TAG}" target/generate-rpm/*.rpm \
            --repo "${{ github.repository }}" --clobber

  package-flatpak:
    name: Flatpak (.flatpak)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
          submodules: recursive
      - name: Regenerate cargo-sources.json
        run: bash scripts/generate-flatpak-cargo-sources.sh
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: sherion-x86_64.flatpak
          manifest-path: flatpak/com.hocestnonsatis.Sherion.yml
          cache-key: sherion-flatpak-${{ github.sha }}
      - name: Install GitHub CLI
        run: |
          curl -fsSL https://github.com/cli/cli/releases/download/v2.67.0/gh_2.67.0_linux_amd64.tar.gz -o /tmp/gh.tgz
          tar -xzf /tmp/gh.tgz -C /tmp
          echo "GH=/tmp/gh_2.67.0_linux_amd64/bin/gh" >> "$GITHUB_ENV"
      - name: Upload Flatpak bundle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory '*'
          "${GH}" release upload "${TAG}" *.flatpak \
            --repo "${{ github.repository }}" --clobber

  package-appimage:
    name: AppImage
    if: ${{ (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') && !(github.event_name == 'workflow_dispatch' && inputs.skip_appimage) }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
      - name: Download Linux archive from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --pattern '*x86_64-unknown-linux-gnu.tar.*' \
            --dir dist \
            --clobber
          archive="$(find dist -name '*x86_64-unknown-linux-gnu.tar.*' | head -1)"
          tar -xf "${archive}" -C dist
          find dist -name sherion -type f -executable | head -1 | xargs -I{} cp {} dist/sherion
          chmod +x dist/sherion
      - name: Build AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-appimage-x86_64.AppImage
          export ARCH=x86_64
          export VERSION="${TAG#v}"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable dist/sherion \
            --desktop-file packaging/com.hocestnonsatis.Sherion.desktop \
            --icon-file assets/icons/hicolor/256x256/apps/com.hocestnonsatis.Sherion.png \
            --output appimage
          APPIMAGE="$(ls Sherion-*.AppImage | head -1)"
          cp "${APPIMAGE}" "Sherion-x86_64.AppImage"
      - name: Upload AppImage to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${TAG}" Sherion-x86_64.AppImage --clobber
